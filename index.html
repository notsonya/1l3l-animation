<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js ASCII STL</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: white;
      }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.156.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.156.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { AsciiEffect } from "three/addons/effects/AsciiEffect.js";
      import { STLLoader } from "three/addons/loaders/STLLoader.js";
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#ffffff");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      const effect = new AsciiEffect(renderer, " .:-+*=%@#", { invert: false });
      effect.setSize(window.innerWidth, window.innerHeight);
      effect.domElement.style.color = "#0022ff";
      effect.domElement.style.backgroundColor = "white";
      effect.domElement.style.fontSize = "1px";
      effect.domElement.style.lineHeight = "1px";
      document.body.appendChild(effect.domElement);
      // Lighting
      const hemiLight = new THREE.HemisphereLight("white", "#444444", 1.5);
      scene.add(hemiLight);
      const dirLight = new THREE.DirectionalLight("white", 3);
      dirLight.position.set(10, 20, 10);
      scene.add(dirLight);
      const dirLight2 = new THREE.DirectionalLight("white", 1);
      dirLight2.position.set(-10, -10, -10);
      scene.add(dirLight2);
      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        effect.setSize(width, height);
      }
      window.addEventListener("resize", resize);
      // Turntable state
      let autoRotate = true;
      // STL
      const loader = new STLLoader();
      let mesh;
      loader.load("1L3L.stl", (geometry) => {
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();
        const box = geometry.boundingBox;
        const centre = new THREE.Vector3();
        box.getCenter(centre);
        geometry.translate(-centre.x, -centre.y, -centre.z);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 40 / maxDim;
        const material = new THREE.MeshStandardMaterial({ color: "#333333" });
        mesh = new THREE.Mesh(geometry, material);
        mesh.scale.setScalar(scale);
        scene.add(mesh);
        controls.target.set(0, 0, 0);
        controls.update();
      });
      const controls = new OrbitControls(camera, effect.domElement);
      camera.position.set(0, 8, 2);
      controls.target.set(0, 0, 0);
      controls.maxDistance = 80;
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      
      // prevents wheel/scroll from zooming
      controls.enableZoom = false;
      
      controls.update();
      // Stop the moment one touches/clicks
      effect.domElement.addEventListener("pointerdown", () => {
        autoRotate = false;
      });
      function animate() {
        requestAnimationFrame(animate);
        if (autoRotate && mesh) {
          mesh.rotation.y += 0.005;
        }
        controls.update();
        effect.render(scene, camera);
      }
      animate();
    </script>
  </head>
  <body></body>
</html>
